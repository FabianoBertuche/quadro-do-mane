# Render.com Infrastructure as Code
# Deploy: https://dashboard.render.com/new?type=blueprint
# Docs: https://render.com/docs/blueprint-spec

services:
  # ─── API (NestJS) ───────────────────────────────────────────────────────
  - type: web
    name: quadro-api
    runtime: node
    plan: starter
    region: ohio
    healthCheckPath: /health
    autoDeploy: true

    installCommand: npm install
    buildCommand: cd apps/api && npx prisma generate && npx prisma migrate deploy && cd ../.. && npm run build:api
    startCommand: npm run start:prod --workspace=apps/api

    envVars:
      - key: NODE_ENV
        value: production

      # Database — set this in the dashboard (do NOT commit secrets)
      - key: DATABASE_URL
        sync: false

      # JWT — auto-generated secrets (save these somewhere safe!)
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "15m"
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_REFRESH_EXPIRES_IN
        value: "7d"

      # Encryption — must be a 64-char hex string (32 bytes, AES-256-GCM)
      - key: ENCRYPTION_KEY
        sync: false

      # CORS — auto-references the web service URL
      - key: CORS_ORIGINS
        fromService:
          name: quadro-web
          type: web
          envVarKey: RENDER_EXTERNAL_URL

      # Cookies
      - key: COOKIE_DOMAIN
        value: ".onrender.com"
      - key: COOKIE_SECURE
        value: "true"

      # Security
      - key: BCRYPT_ROUNDS
        value: "12"

  # ─── Web (Next.js) ──────────────────────────────────────────────────────
  - type: web
    name: quadro-web
    runtime: node
    plan: starter
    region: ohio
    healthCheckPath: /
    autoDeploy: true

    installCommand: npm install
    buildCommand: npm run build:web
    startCommand: npm run start --workspace=apps/web

    envVars:
      - key: NODE_ENV
        value: production

      # Proxy target — auto-references the API service URL
      - key: API_BACKEND_URL
        fromService:
          name: quadro-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL

      # Client-side — relative path so requests go through the Next.js proxy
      - key: NEXT_PUBLIC_API_URL
        value: "/api"
